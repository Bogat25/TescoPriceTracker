<div class="hex-layout">
  <!-- Fixed left sidebar (hidden on mobile) -->
  <div class="hex-sidebar">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Main content: beehive bg + routed pages -->
  <div class="hex-main">
    <app-beehive-bg [opacity]="0.12"></app-beehive-bg>
    <div class="hex-scroll">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Mobile bottom tab bar (visible only on < 640px via CSS) -->
  <nav class="hex-bottom-nav" aria-label="Main navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>
    <a routerLink="/search" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search
    </a>
    <a routerLink="/products" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      List
    </a>
    <a routerLink="/statistics" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
      </svg>
      Stats
    </a>
    <a routerLink="/alerts" routerLinkActive="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      Alerts
    </a>
    <!-- Account/Login tab in mobile -->
    <a class="hex-mobile-account" (click)="mobileAccount()" style="cursor:pointer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Account
    </a>
  </nav>

  <!-- Mobile account bottom sheet (authenticated users only) -->
  @if (mobileMenuOpen()) {
    <div class="mob-overlay" (click)="closeMobileMenu()"></div>
    <div class="mob-sheet" role="dialog" aria-modal="true" aria-label="Account options">
      <!-- Handle -->
      <div class="mob-sheet-handle"></div>

      <!-- Panel 1: Language -->
      <div class="mob-panel">
        <div class="mob-panel-label">Language</div>
        <div class="mob-lang-row">
          <button type="button" class="mob-lang-btn" [class.active]="tl.lang() === 'en'" (click)="tl.setLang('en')">
            🇬🇧 English
          </button>
          <button type="button" class="mob-lang-btn" [class.active]="tl.lang() === 'hu'" (click)="tl.setLang('hu')">
            🇭🇺 Magyar
          </button>
        </div>
      </div>

      <div class="mob-sep"></div>

      <!-- Panel 2: Theme -->
      <div class="mob-panel">
        <div class="mob-panel-label">Appearance</div>
        <button type="button" class="mob-theme-btn" (click)="themeService.toggleTheme()">
          <div class="mob-theme-icon">
            {{ themeService.theme() === 'dark' ? '🌙' : '☀️' }}
          </div>
          <span class="mob-theme-text">{{ themeService.theme() === 'dark' ? 'Dark mode' : 'Light mode' }}</span>
          <div class="mob-toggle-pill" [class.on]="themeService.theme() === 'dark'">
            <div class="mob-toggle-knob"></div>
          </div>
        </button>
      </div>

      <div class="mob-sep"></div>

      <!-- Panel 3: Account settings -->
      <div class="mob-panel">
        <button type="button" class="mob-action-btn" (click)="mobileAccountSettings()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          Account Settings
        </button>
      </div>

      <div class="mob-sep"></div>

      <!-- Panel 4: Logout -->
      <div class="mob-panel">
        <button type="button" class="mob-action-btn mob-action-btn--danger" (click)="mobileLogout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Log Out
        </button>
      </div>
    </div>
  }
</div>
