server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Auth routes — handled by FastAPI auth-api
    location /api/tesco/auth/ {
        proxy_pass http://auth-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location = /api/tesco/user/session {
        proxy_pass http://auth-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /api/tesco/user/profile {
        proxy_pass http://auth-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /api/tesco/user/delete {
        proxy_pass http://auth-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Everything else under /api/tesco/ → tesco-api gateway
    location /api/tesco/ {
        proxy_pass http://tesco-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
