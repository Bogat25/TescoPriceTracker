server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── All API routes go through Gateway.API in production ─────────────────
    # This static file is a development fallback only. In production, the
    # nginx.conf.template is used with envsubst, pointing all routes to
    # Gateway.API (gavaller-backend-gateway:8080).

    # ── Tesco API via Gateway ───────────────────────────────────────────────
    location /api/tesco/ {
        proxy_pass http://gavaller-backend-gateway:8080/api/tesco/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 30s;
    }

    # ── Alerts API via Gateway ─────────────────────────────────────────────
    location /api/alerts/ {
        proxy_pass http://gavaller-backend-gateway:8080/api/alerts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
    }

    # ── Auth via Gateway ───────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://gavaller-backend-gateway:8080/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 30s;
    }

    # ── Runtime config — no cache ──────────────────────────────────────────
    location = /runtime-config.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # ── Angular SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
