name: Docker CI

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Override target build platforms (comma-separated, e.g. linux/arm64 or linux/amd64,linux/arm64). Leave blank to use the default."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:

  # ── Python backend (api + scheduler) ────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    env:
      # Default deployment target is the Intel i5 host. Set BUILD_PLATFORMS to
      # linux/arm64 or linux/amd64,linux/arm64 only when intentionally shipping
      # Raspberry Pi-compatible images too.
      BUILD_PLATFORMS: ${{ github.event.inputs.platforms || vars.BUILD_PLATFORMS || 'linux/amd64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(env.BUILD_PLATFORMS, 'arm')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.BUILD_PLATFORMS }}
