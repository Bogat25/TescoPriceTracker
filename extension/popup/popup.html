<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Tesco Price Tracker</title>
</head>
<body data-theme="dark">

  <!-- Decorative hex background SVG (matches website design) -->
  <svg class="popup-hex-bg" aria-hidden="true" viewBox="0 0 320 480"
       xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <polygon points="240,10  280,33  280,79  240,102 200,79  200,33"  fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.55"/>
    <polygon points="270,70  310,93  310,139 270,162 230,139 230,93"  fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.35"/>
    <polygon points="10,40   50,63   50,109  10,132  -30,109 -30,63"  fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
    <polygon points="60,370  100,393 100,439 60,462  20,439  20,393"  fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
    <polygon points="280,380 320,403 320,449 280,472 240,449 240,403" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
    <polygon points="140,5   180,28  180,74  140,97  100,74  100,28"  fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.25"/>
    <polygon points="20,200  60,223  60,269  20,292  -20,269 -20,223" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
    <polygon points="300,200 340,223 340,269 300,292 260,269 260,223" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  </svg>

  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-header-logo">
        <img src="../icons/icon-48.png" width="28" height="28" alt="" aria-hidden="true"/>
        <h1>Tesco Price Tracker</h1>
      </div>
      <div class="popup-header-controls">
        <span class="version">v1.2.1</span>
        <!-- Language toggle -->
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn" id="lang-en" data-lang="en">EN</button>
          <button type="button" class="lang-btn" id="lang-hu" data-lang="hu">HU</button>
        </div>
        <!-- Dark / Light theme toggle -->
        <button type="button" class="theme-toggle-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <!-- icon injected by JS -->
        </button>
      </div>
    </header>

    <!-- Account section -->
    <div class="account-section" id="account-section">
      <!-- Logged out state -->
      <div class="account-logged-out" id="account-logged-out">
        <p class="account-prompt" data-i18n="loginPrompt">Sign in to sync alerts between extension &amp; website</p>
        <button type="button" class="btn-login" id="btn-login">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span data-i18n="signIn">Sign In</span>
        </button>
      </div>
      <!-- Logged in state -->
      <div class="account-logged-in" id="account-logged-in" style="display:none;">
        <div class="account-user">
          <div class="account-avatar" id="account-avatar">U</div>
          <div class="account-info">
            <span class="account-name" id="account-name">User</span>
            <span class="account-email" id="account-email"></span>
          </div>
        </div>
        <div class="account-auth-actions">
          <button type="button" class="btn-switch-account" id="btn-switch-account" data-i18n="switchAccount">Switch</button>
          <button type="button" class="btn-logout" id="btn-logout" data-i18n="signOut">Sign Out</button>
        </div>
      </div>
    </div>

    <!-- Enable Extension toggle -->
    <div class="toggle-section">
      <label class="toggle-label" for="toggle-switch" data-i18n="enableExtension">
        Enable Extension
      </label>
      <label class="toggle">
        <input type="checkbox" id="toggle-switch" />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Alerts summary (logged in only) -->
    <div class="alerts-section" id="alerts-section" style="display:none;">
      <div class="alerts-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span data-i18n="myAlerts">My Alerts</span>
        <span class="alerts-badge" id="alerts-badge">0</span>
      </div>
      <div class="alerts-list" id="popup-alerts-list">
        <div class="alerts-loading" data-i18n="loading">Loading...</div>
      </div>
    </div>

    <!-- Open website button -->
    <button type="button" class="open-website-btn" id="open-website-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      <span data-i18n="openWebsite">Open Price Tracker Website</span>
    </button>

    <!-- Footer -->
    <footer class="popup-footer">
      <p data-i18n="footer">Price history charts &amp; alerts sync with your account.</p>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
