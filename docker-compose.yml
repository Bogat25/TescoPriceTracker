version: '3.8'

services:

  # â”€â”€ Data store â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  mongo:
    image: mongo:8
    container_name: ${STACK_PREFIX}tesco-tracker-mongo
    restart: unless-stopped
    volumes:
      - ${HOST_ROOT_PATH:?HOST_ROOT_PATH must be set in .env}/mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}
    networks:
      - tesco-tracker-internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" localhost:27017/admin --quiet || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongo-express:
    image: mongo-express:latest
    container_name: ${STACK_PREFIX}tesco-tracker-mongo-express
    restart: unless-stopped
    expose:
      - "8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}@mongo:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-secretpassword}
    networks:
      tesco-tracker-internal: {}
      admin_ingress:
        aliases:
          - ${STACK_PREFIX}tesco-tracker-mongo-express
    depends_on:
      mongo:
        condition: service_healthy

  # ── Identity provider permission fix ──────────────────────────────────────────
  # Docker creates host bind mounts as root. Keycloak runs as UID 1000.
  # This quick init container sets the right ownership on the host directory.
  keycloak-init:
    image: busybox
    container_name: ${STACK_PREFIX}tesco-tracker-keycloak-init
    profiles: ["auth"]
    volumes:
      - ${HOST_ROOT_PATH:?HOST_ROOT_PATH must be set in .env}/keycloak:/opt/keycloak/data
    command: chown -R 1000:1000 /opt/keycloak/data

  # ── Identity provider ───────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: ${STACK_PREFIX}tesco-tracker-keycloak
    restart: unless-stopped
    profiles: ["auth"]
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/scripts/docker-entrypoint.sh"]
    expose:
      - "8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tesco-tracker}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-tesco-frontend}
      KC_ADMIN_CLIENT_ID: ${KC_ADMIN_CLIENT_ID:-tesco-alert-admin}
      KC_ADMIN_CLIENT_SECRET: ${KC_ADMIN_CLIENT_SECRET:-changeme-admin-secret}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-443}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
      KC_HEALTH_ENABLED: "true"
      QUARKUS_LOG_CATEGORY__IO_QUARKUS_VERTX_HTTP_RUNTIME_FORWARDEDPARSER__LEVEL: "OFF"
      REALM_REDIRECT_URIS: ${REALM_REDIRECT_URIS:-*}
      REALM_WEB_ORIGINS: ${REALM_WEB_ORIGINS:-*}
      REALM_POST_LOGOUT_REDIRECT_URIS: ${REALM_POST_LOGOUT_REDIRECT_URIS:-+}
    volumes:
      - ./keycloak/docker-entrypoint.sh:/scripts/docker-entrypoint.sh:ro
      - ./keycloak/realm-template.json:/scripts/realm-template.json:ro
      - ${HOST_ROOT_PATH:?HOST_ROOT_PATH must be set in .env}/keycloak:/opt/keycloak/data
    healthcheck:
      # Keycloak 26 image (UBI9-micro based) has no curl/wget. Use the bundled JVM
      # to probe the management /health/ready endpoint. This is the approach
      # documented at https://www.keycloak.org/server/health
      test: ["CMD-SHELL", "[ -f /tmp/HealthCheck.java ] || echo \"public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }\" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:9000/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      tesco-tracker-internal: {}
      public_ingress:
        aliases:
          - ${STACK_PREFIX}tesco-tracker-keycloak
      admin_ingress:
        aliases:
          - ${STACK_PREFIX}tesco-tracker-keycloak

  # â”€â”€ Backend API â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  auth-gateway:
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tescopricetracker:latest
    container_name: ${STACK_PREFIX}tesco-tracker-auth-gateway
    restart: unless-stopped
    profiles: ["auth"]
    working_dir: /app/auth-gateway
    command: uvicorn app:app --host 0.0.0.0 --port 8080
    expose:
      - "8080"
    environment:
      KC_PUBLIC_BASE_URL: ${KC_PUBLIC_BASE_URL}
      KC_INTERNAL_BASE_URL: ${KC_INTERNAL_BASE_URL:-http://keycloak:8080/realms/tesco-tracker}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-tesco-frontend}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:-}
      GATEWAY_REDIRECT_URI: ${GATEWAY_REDIRECT_URI}
      POST_LOGIN_REDIRECT_DEFAULT: ${POST_LOGIN_REDIRECT_DEFAULT}
      POST_LOGOUT_REDIRECT_DEFAULT: ${POST_LOGOUT_REDIRECT_DEFAULT}
      RETURN_URL_ALLOWED_HOSTS: ${RETURN_URL_ALLOWED_HOSTS}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-tesco_auth}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      SCOPES: ${SCOPES:-openid profile email}
      PYTHONPATH: /app
      TZ: Europe/Budapest
    networks:
      - tesco-tracker-internal
    depends_on:
      keycloak:
        condition: service_started
        required: false

  api:
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tescopricetracker:latest
    container_name: ${STACK_PREFIX}tesco-price-tracker-api
    restart: unless-stopped
    working_dir: /app/backend-api
    command: uvicorn app:app --host 0.0.0.0 --port 50202
    expose:
      - "50202"
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}@mongo:27017/
      MONGO_DB_NAME: ${MONGO_DB_NAME:-tesco_tracker}
      MONGO_COLLECTION: ${MONGO_COLLECTION:-products}
      PYTHONPATH: /app
      TZ: Europe/Budapest
    networks:
      tesco-tracker-internal: {}
      public_ingress:
        aliases:
          - ${STACK_PREFIX}tesco-price-tracker-api
    depends_on:
      mongo:
        condition: service_healthy

  # â”€â”€ Scrape scheduler â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  scheduler:
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tescopricetracker:latest
    container_name: ${STACK_PREFIX}tesco-tracker-scheduler
    restart: unless-stopped
    working_dir: /app/scheduler
    command: python scheduler.py
    environment:
      API_KEY: ${API_KEY}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}@mongo:27017/
      MONGO_DB_NAME: ${MONGO_DB_NAME:-tesco_tracker}
      MONGO_COLLECTION: ${MONGO_COLLECTION:-products}
      ALERT_SERVICE_TRIGGER_URL: ${ALERT_SERVICE_TRIGGER_URL:-http://alert-service:8080/internal/trigger}
      INTERNAL_TRIGGER_TOKEN: ${INTERNAL_TRIGGER_TOKEN:-}
      PYTHONPATH: /app
      TZ: Europe/Budapest
    networks:
      - tesco-tracker-internal
    depends_on:
      mongo:
        condition: service_healthy

  # ── Alert service ───────────────────────────────────────────────────────
  alert-service:
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tescopricetracker:latest
    container_name: ${STACK_PREFIX}tesco-alert-service
    restart: unless-stopped
    working_dir: /app/alert-service
    command: uvicorn app:app --host 0.0.0.0 --port 8080
    expose:
      - "8080"
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}@mongo:27017/
      MONGO_ALERTS_DB_NAME: ${MONGO_ALERTS_DB_NAME:-tesco_alerts}
      KC_INTERNAL_BASE_URL: ${KC_INTERNAL_BASE_URL:-http://keycloak:8080/realms/tesco-tracker}
      KC_ISSUER: ${KC_ISSUER:-${KC_INTERNAL_BASE_URL:-http://keycloak:8080/realms/tesco-tracker}}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-tesco-frontend}
      KC_ADMIN_BASE_URL: ${KC_ADMIN_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tesco-tracker}
      KC_ADMIN_CLIENT_ID: ${KC_ADMIN_CLIENT_ID:-tesco-alert-admin}
      KC_ADMIN_CLIENT_SECRET: ${KC_ADMIN_CLIENT_SECRET:-}
      INTERNAL_TRIGGER_TOKEN: ${INTERNAL_TRIGGER_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      ALLOWED_ORIGINS: ${ALERTS_ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /app
      TZ: Europe/Budapest
    networks:
      tesco-tracker-internal: {}
      gavaller-backend-internal:
        aliases:
          - gavaller-backend-tesco-alert-service
    depends_on:
      mongo:
        condition: service_healthy

  # ── Alert keycloak sync (daily cron) ───────────────────────────────────
  alert-keycloak-sync:
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tescopricetracker:latest
    container_name: ${STACK_PREFIX}tesco-alert-keycloak-sync
    restart: unless-stopped
    profiles: ["auth"]
    working_dir: /app/alert-service
    command: python jobs/keycloak_sync.py
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secretpassword}@mongo:27017/
      MONGO_ALERTS_DB_NAME: ${MONGO_ALERTS_DB_NAME:-tesco_alerts}
      KC_ADMIN_BASE_URL: ${KC_ADMIN_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tesco-tracker}
      KC_ADMIN_CLIENT_ID: ${KC_ADMIN_CLIENT_ID:-tesco-alert-admin}
      KC_ADMIN_CLIENT_SECRET: ${KC_ADMIN_CLIENT_SECRET:-}
      KEYCLOAK_SYNC_CRON: ${KEYCLOAK_SYNC_CRON:-0 3 * * *}
      KEYCLOAK_SYNC_PAGE_SIZE: ${KEYCLOAK_SYNC_PAGE_SIZE:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /app
      TZ: Europe/Budapest
    networks:
      - tesco-tracker-internal
    depends_on:
      mongo:
        condition: service_healthy
      keycloak:
        condition: service_started
        required: false

  # â”€â”€ Angular SPA â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GHCR_USERNAME:-bogat25}/tesco-tracker-frontend:latest
    container_name: ${STACK_PREFIX}tesco-tracker-frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      # Nginx upstream for /api/tesco/* proxy (internal service-to-service)
      TESCO_API_UPSTREAM: ${TESCO_API_UPSTREAM}
      # Nginx upstream for /auth/* proxy. Standalone mode: in-stack auth-gateway.
      # Embedded mode: an external gateway reachable on a shared network.
      AUTH_UPSTREAM: ${AUTH_UPSTREAM}
      # Nginx upstream for /api/alerts/* proxy. Standalone mode default points
      # at the in-stack alert-service. Embedded mode normally bypasses nginx.
      ALERTS_API_UPSTREAM: ${ALERTS_API_UPSTREAM:-http://alert-service:8080}
      # Runtime config injected into window.__APP_CONFIG__ by envsubst at startup
      TESCO_API_BASE_URL: ${TESCO_API_BASE_URL}
      AUTH_BASE_URL: ${AUTH_BASE_URL}
      AUTH_LOGIN_URL: ${AUTH_LOGIN_URL}
      AUTH_LOGOUT_URL: ${AUTH_LOGOUT_URL}
      AUTH_USERINFO_URL: ${AUTH_USERINFO_URL}
      AUTH_TOKEN_URL: ${AUTH_TOKEN_URL:-/auth/token}
      NGINX_ENVSUBST_TEMPLATE_VARS: TESCO_API_UPSTREAM,AUTH_UPSTREAM,ALERTS_API_UPSTREAM,AUTH_BASE_URL,AUTH_LOGIN_URL,AUTH_LOGOUT_URL,AUTH_USERINFO_URL,AUTH_TOKEN_URL
    networks:
      tesco-tracker-internal: {}
      public_ingress:
        aliases:
          - ${STACK_PREFIX}price-tracker
    depends_on:
      api:
        condition: service_started
      auth-gateway:
        condition: service_started
        required: false

# â”€â”€ Networks â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
networks:
  tesco-tracker-internal:
    name: ${STACK_PREFIX}tesco-tracker-internal
  public_ingress:
    external: true
    name: public_ingress
  admin_ingress:
    external: true
    name: admin_ingress
  # External, owned by the Gavaller ecosystem stack. The alert-service joins it
  # so the Gavaller YARP gateway can reach it cross-stack. Standalone deployers
  # must create it once before `docker compose up`:
  #   docker network create gavaller-backend-internal
  gavaller-backend-internal:
    external: true
    name: gavaller-backend-internal

# â”€â”€ Volumes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
